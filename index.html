  body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: monospace; overflow: hidden; }
  /* Canvas keeps its native pixel resolution (width/height attrs); JS sizes the
     CSS box to fit the viewport while preserving aspect ratio. touch-action:none
     stops the browser hijacking taps for scroll/zoom so the game gets them. */
  canvas { display: block; cursor: pointer; touch-action: none; }

<script>
const CELL = 40;
const COLS = 24;
const ROWS = 16;
const PANEL_W = 240;
const TOP_H = 50;
const CW = COLS * CELL + PANEL_W;
const CH = ROWS * CELL + TOP_H;

const canvas = document.getElementById('c');
canvas.width = CW;
canvas.height = CH;
const ctx = canvas.getContext('2d');

// Scale the canvas's on-screen size to fit the viewport (preserving aspect ratio,
// never upscaling past native). The drawing buffer stays CW×CH so all game math is
// unchanged; only the CSS box shrinks. Pointer handlers convert back via the rect.
function fitCanvas() {
  const scale = Math.min(window.innerWidth / CW, window.innerHeight / CH, 1);
  canvas.style.width = CW * scale + 'px';
  canvas.style.height = CH * scale + 'px';
}
window.addEventListener('resize', fitCanvas);
window.addEventListener('orientationchange', fitCanvas);
fitCanvas();

const MAP_NAMES = ['Classic', 'Winding', 'Lake', 'Serpentine'];

// Lake cells per map (blocked for tower placement, drawn as water)
const LAKES = [
  [], // Classic
  [], // Winding
  [ // Lake — two 3×3 ponds
    [5,2],[5,3],[5,4],[6,2],[6,3],[6,4],[7,2],[7,3],[7,4],   // Lake 1 (top-left)

let activeMap = 0;
let ACTIVE_PATH, PATH_SET, WAYPOINTS, LAKE_SET;
function setMap(idx) {
  activeMap = idx;
  ACTIVE_PATH = PATHS[idx];
  PATH_SET = new Set(ACTIVE_PATH.map(([c,r]) => `${c},${r}`));
  WAYPOINTS = ACTIVE_PATH.map(([c,r]) => ({ x: c*CELL+CELL/2, y: r*CELL+TOP_H+CELL/2 }));
  LAKE_SET = new Set((LAKES[idx] || []).map(([c,r]) => `${c},${r}`));
}
setMap(0);

const TOWER_TYPES = {
  sniper:  { name:'Sniper',  color:'#ef9a9a', cost:125,  dmg:85,  range:7.5, rate:0.5,  splash:0,   burnDps:0,  burnDur:0, slowMult:0, slowDur:0, desc:'Extreme range'       },
  fire:    { name:'Fire',    color:'#ff7043', cost:175,  dmg:25,  range:3.5, rate:0.9,  splash:1.2, burnDps:15, burnDur:3, slowMult:0, slowDur:0, desc:'Burns + splash'      },
  cryo:    { name:'Cryo',    color:'#81d4fa', cost:250,  dmg:20,  range:3.5, rate:0.75, splash:1.5, burnDps:0,  burnDur:0, slowMult:0.3, slowDur:3, desc:'Slows to 30% speed' },
  nuke:    { name:'Nuke',    color:'#ce93d8', cost:600,  dmg:450, range:7,   rate:0.1,  splash:6,   burnDps:0,  burnDur:0, slowMult:0, slowDur:0, desc:'Catastrophic AoE'   },

  god:     { name:'God',     color:'#fffde7', cost:2800, dmg:140, range:6,   rate:2.5,  splash:0,   burnDps:0,  burnDur:0, slowMult:0, slowDur:0, desc:'Divine AoE, 2× Tesla' },
  blackhole:{name:'Black Hole',color:'#7e57c2',cost:15000,dmg:700, range:5,  rate:2.5,  splash:0,   burnDps:0,  burnDur:0, slowMult:0.4, slowDur:1, desc:'Gravity AoE + slow' },
};

// Upgrade definitions. `mode` drives firing behaviour:
//   'rate' — AoE on a cooldown (uses `dmg`,`rate`); 'beam' — continuous single-target (`dps`);
//   'aoe'  — continuous all-in-range (`dps`, optional `slowMult`/`burn`).
const SUNGOD       = { mode:'rate', name:'SUN GOD',       icon:'☀', cost:6000,   dmg:350,  rate:1.2, range:12,  color:'#ffd700' };
const SUPERNOVA    = { mode:'rate', name:'SUPERNOVA',     icon:'💥', cost:25000,  dmg:1050, rate:1.2, range:12,  color:'#ff8c00' };
const DEATHRAY     = { mode:'beam', name:'DEATH RAY',     icon:'⚡', cost:5000,   dps:900,  range:8,             color:'#ff1744' };
const OMEGARAY     = { mode:'beam', name:'OMEGA RAY',     icon:'☄', cost:22000,  dps:2700, range:8,             color:'#ff0055' };
const RAILGUN      = { mode:'beam', name:'RAILGUN',       icon:'🎯', cost:7000,   dps:400,  range:11,            color:'#ff4444' };
const GODSHOT      = { mode:'beam', name:'GODSHOT',       icon:'☠', cost:60000,  dps:10000,range:14,            color:'#d500f9' };
const PERMAFROST   = { mode:'aoe',  name:'PERMAFROST',    icon:'❄', cost:4500,   dps:50,   range:4.5, slowMult:0.1,  color:'#00e5ff' };
const ABSOLUTEZERO = { mode:'aoe',  name:'ABSOLUTE ZERO', icon:'🧊', cost:20000,  dps:150,  range:5,   slowMult:0.05, color:'#00ffee' };
const INFERNO      = { mode:'aoe',  name:'INFERNO',       icon:'🔥', cost:5000,   dps:120,  range:2.5, burn:true,     color:'#ff3300' };
const CANNONADE    = { mode:'aoe',  name:'CANNONADE',     icon:'⚓', cost:12000,  dps:3000, range:5,   color:'#29b6f6' };
const BROADSIDE    = { mode:'aoe',  name:'BROADSIDE',     icon:'🚢', cost:45000,  dps:5000, range:6,   color:'#0288d1' };
const GODRAY       = { mode:'aoe',  name:'GOD RAY',       icon:'✦', cost:10000,  dps:1800, range:8,   color:'#ffeb3b' };
const DIVINITY     = { mode:'aoe',  name:'DIVINITY',      icon:'✧', cost:40000,  dps:5400, range:8,   color:'#fff59d' };
const QUASAR       = { mode:'aoe',  name:'QUASAR',        icon:'🌀', cost:80000,  dps:9000, range:6,   slowMult:0.3,  color:'#b388ff' };
const SINGULARITY  = { mode:'aoe',  name:'SINGULARITY',   icon:'🕳', cost:300000, dps:28000,range:7.5, slowMult:0.2,  color:'#e040fb' };

// Lookup by upgrade key + the per-base-tower upgrade chains (ordered tiers).
const UPGRADE_DEFS = {
  sungod:SUNGOD, supernova:SUPERNOVA, deathray:DEATHRAY, omegaray:OMEGARAY,
  permafrost:PERMAFROST, absolutezero:ABSOLUTEZERO, railgun:RAILGUN, godshot:GODSHOT,
  inferno:INFERNO, cannonade:CANNONADE, broadside:BROADSIDE, godray:GODRAY, divinity:DIVINITY,
  quasar:QUASAR, singularity:SINGULARITY,
};
const UPGRADE_TREE = {
  nuke:['sungod','supernova'], tesla:['deathray','omegaray'], cryo:['permafrost','absolutezero'],
  sniper:['railgun','godshot'], fire:['inferno'], warship:['cannonade','broadside'], god:['godray','divinity'],
  blackhole:['quasar','singularity'],
};

// Enemy archetypes. Boss is handled separately (isBoss flag).
const ENEMY_TYPES = {
  normal: { hpMul:1,   speedMul:1,    r:10, color:'#e53935', stroke:'#b71c1c' },
  fast:   { hpMul:0.5, speedMul:1.8,  r:8,  color:'#aeea00', stroke:'#827717' },
  tank:   { hpMul:3,   speedMul:0.55, r:14, color:'#607d8b', stroke:'#263238' },
};

let bestWave = 0;
try { bestWave = +(localStorage.getItem('td_best') || 0) || 0; } catch (e) {}

let state = createState();

function createState() {
  return {
    gold: 200, lives: 20, wave: 0,
    waveActive: false, waveSpawned: 0, waveTotal: 0, spawnTimer: 0,
    waveHasBoss: false, bossSpawned: false,
    autoStart: false, paused: false,
    speed: 1, selectedTower: 'sniper',
    towers: [], enemies: [], projectiles: [], particles: [],
    hoverCell: null, hoveredTower: null, selectedPlacedTower: null,
    mapDropdownOpen: false,
    abilityCd: { airstrike: 0, freeze: 0, repair: 0 },
    screenFlash: 0,
    gameOver: false, lastTime: 0,
  };
}

// ─── Tower power: infinite "Ascension" upgrades (the late-game gold sink) ──────
// Each ascension level adds +30% damage; cost rises exponentially so even billions
// get consumed. Ascension spend is sunk (not added to `invested`), so it neither
// refunds on sell nor inflates the next ascension cost.
function towerDmgMult(t) { return 1 + 0.30 * (t.ascend || 0); }
function ascendCost(t) {
  const base = Math.max(800, (t.invested || 800) * 0.4);
  return Math.round(base * Math.pow(1.6, t.ascend || 0));
}
// What tapping a selected tower buys next: the next tier upgrade, else an ascension level.
function nextPurchase(t) {
  const tree = UPGRADE_TREE[t.type] || [];
  const idx = t.upgrade ? tree.indexOf(t.upgrade) : -1;
  const nextKey = tree[idx + 1] || null;
  if (nextKey) { const u = UPGRADE_DEFS[nextKey]; return { kind:'tier', key:nextKey, label:`${u.icon} ${u.name}`, cost:u.cost }; }
  return { kind:'ascend', label:`✦ ASCEND Lv ${(t.ascend || 0) + 1}`, cost: ascendCost(t) };
}
function buyTowerUpgrade(t) {
  const p = nextPurchase(t);
  if (state.gold < p.cost) return false;
  state.gold -= p.cost;
  if (p.kind === 'tier') { t.upgrade = p.key; t.invested = (t.invested || 0) + p.cost; }
  else { t.ascend = (t.ascend || 0) + 1; }
  return true;
}

// ─── Spendable abilities (active gold sinks for mid-wave plays) ────────────────
const ABILITY_CD = { airstrike: 6, freeze: 8, repair: 4 };
function abilityCost(key) {
  const w = state.wave;
  if (key === 'airstrike') return 5000 + 1500 * w;
  if (key === 'freeze')    return 3000 + 1000 * w;
  return 5000 + 2000 * w; // repair
}
function useAbility(key) {
  if (state.abilityCd[key] > 0) return;
  const cost = abilityCost(key);
  if (state.gold < cost) return;
  state.gold -= cost;
  state.abilityCd[key] = ABILITY_CD[key];
  if (key === 'airstrike') {
    state.screenFlash = 0.55;
    for (const e of state.enemies) {
      if (e.dead || e.reached) continue;
      damageEnemy(e, e.maxHp * 0.4);            // 40% of max HP — clears packs, dents bosses
    }
    for (let i = 0; i < 7; i++) {
      const ex = 40 + Math.random() * (COLS * CELL - 80), ey = TOP_H + 40 + Math.random() * (ROWS * CELL - 80);
      for (let k = 1; k <= 3; k++) state.particles.push({ type:'ring', x:ex, y:ey, r:0, maxR:50*k, life:0.6, maxLife:0.6, color:'#ff7043' });
      for (let s = 0; s < 10; s++) { const a = Math.random()*Math.PI*2, sp = 120+Math.random()*180;
        state.particles.push({ type:'spark', x:ex, y:ey, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:0.7, maxLife:0.7, color:'#ffd54f', r:5 }); }
    }
  } else if (key === 'freeze') {
    for (const e of state.enemies) { if (!e.dead && !e.reached) applySlow(e, 0.12, 4); }
    for (let i = 0; i < 14; i++) { const a = Math.random()*Math.PI*2, rr = Math.random()*COLS*CELL*0.45;
      state.particles.push({ type:'spark', x:COLS*CELL/2+Math.cos(a)*rr, y:TOP_H+ROWS*CELL/2+Math.sin(a)*rr, vx:0, vy:-12, life:0.7, maxLife:0.7, color:'#80d8ff', r:5 }); }
  } else { // repair
    state.lives += 5;
  }
}

function startWave() {
  if (state.waveActive || state.gameOver) return;
  state.wave++;
  state.waveActive = true;
  state.waveSpawned = 0;
  state.waveHasBoss = (state.wave % 5 === 0);
  state.bossSpawned = false;
  state.waveTotal = 6 + state.wave * 2;
  state.spawnTimer = 0;
}

// Base HP for the current wave — gentle exponential so the game stays winnable.
function waveHp(wave) { return Math.round(50 * Math.pow(1.20, wave - 1)); }

// Weighted pick of a non-boss archetype; variety ramps up as waves progress.
function pickEnemyKind() {
  const w = state.wave, r = Math.random();
  if (w < 3) return 'normal';
  if (w < 6) return r < 0.7 ? 'normal' : 'fast';
  if (w < 10) return r < 0.55 ? 'normal' : r < 0.8 ? 'fast' : 'tank';
  return r < 0.45 ? 'normal' : r < 0.75 ? 'fast' : 'tank';
}

function spawnEnemy(kind) {
  const base = waveHp(state.wave);
  const speed = 52 + state.wave * 2.5;
  if (kind === 'boss') {
    const bossHp = Math.round(base * 14);
    state.enemies.push({
      x: WAYPOINTS[0].x, y: WAYPOINTS[0].y,
      wpIdx: 0, hp: bossHp, maxHp: bossHp, speed: speed * 0.55,
      gold: Math.ceil(bossHp / 6), r: 22, etype: 'boss', isBoss: true,
      dead: false, reached: false, flash: 0,
      burnDps: 0, burnTimer: 0, slowMult: 1.0, slowTimer: 0,
    });
    return;
  }
  const et = ENEMY_TYPES[kind] || ENEMY_TYPES.normal;
  const hp = Math.max(1, Math.round(base * et.hpMul));
  state.enemies.push({
    x: WAYPOINTS[0].x, y: WAYPOINTS[0].y,
    wpIdx: 0, hp, maxHp: hp, speed: speed * et.speedMul,
    gold: Math.ceil(hp / 10), r: et.r, etype: kind,
    dead: false, reached: false, flash: 0,
    burnDps: 0, burnTimer: 0, slowMult: 1.0, slowTimer: 0,
  });
}

function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

function applyBurn(e, dps, duration) {
  if (dps > e.burnDps) e.burnDps = dps;
  if (duration > e.burnTimer) e.burnTimer = duration;
}

function applySlow(e, mult, duration) {
  e.slowMult = Math.min(e.slowMult || 1.0, mult);
  if (duration > e.slowTimer) e.slowTimer = duration;
}

function damageEnemyContinuous(e, dmg) {
  if (e.dead) return;
  e.hp -= dmg;
  if (e.hp <= 0) {
    e.dead = true;
    state.gold += e.gold;
    for (let i = 0; i < 6; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd = 50 + Math.random() * 70;
      state.particles.push({ type:'spark', x:e.x, y:e.y, vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd, life:0.45, maxLife:0.45, color:'#ffeb3b', r:3 });
    }
  }
}

function damageEnemy(e, dmg) {
  if (e.dead) return;
  e.hp -= dmg;
  e.flash = 1;
  if (e.hp <= 0) {
    e.dead = true;
    state.gold += e.gold;
    for (let i = 0; i < 6; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd = 50 + Math.random() * 70;
      state.particles.push({ type:'spark', x:e.x, y:e.y, vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd, life:0.45, maxLife:0.45, color:'#ffeb3b', r:3 });
    }
  }
}

// ─── Update ──────────────────────────────────────────────────────────────────

function update(dt) {
  if (state.gameOver) return;

  // Ability cooldowns + screen-flash decay (tick on game time so 4× recharges faster)
  for (const k in state.abilityCd) if (state.abilityCd[k] > 0) state.abilityCd[k] = Math.max(0, state.abilityCd[k] - dt);
  if (state.screenFlash > 0) state.screenFlash = Math.max(0, state.screenFlash - dt * 1.6);

  // Spawn
  if (state.waveActive && state.waveSpawned < state.waveTotal) {
    state.spawnTimer -= dt;
    if (state.spawnTimer <= 0) {
      if (state.waveHasBoss && !state.bossSpawned) {
        spawnEnemy('boss');
        state.bossSpawned = true;
      } else {
        spawnEnemy(pickEnemyKind());
      }
      state.waveSpawned++;
      state.spawnTimer = 0.9 - Math.min(0.5, state.wave * 0.03);
    }
  }

  // Move + status enemies
  for (const e of state.enemies) {
    if (e.dead || e.reached) continue;

    if (e.burnTimer > 0) {
      e.burnTimer -= dt;
      damageEnemy(e, e.burnDps * dt);
      if (e.burnTimer <= 0) { e.burnDps = 0; e.burnTimer = 0; }
      if (e.dead) continue;
    }
    if (e.slowTimer > 0) {
      e.slowTimer -= dt;
      if (e.slowTimer <= 0) { e.slowMult = 1.0; e.slowTimer = 0; }
    }

    const target = WAYPOINTS[e.wpIdx];
    const d = dist(e, target);
    const effectiveSpeed = e.speed * (e.slowTimer > 0 ? e.slowMult : 1.0);
    const step = effectiveSpeed * dt;
    if (d <= step) {
      e.x = target.x; e.y = target.y;
      e.wpIdx++;
      if (e.wpIdx >= WAYPOINTS.length) {
        e.reached = true;
        state.lives = Math.max(0, state.lives - 1);
        if (state.lives <= 0 && !state.gameOver) {
          state.gameOver = true;
          if (state.wave > bestWave) {
            bestWave = state.wave;
            try { localStorage.setItem('td_best', bestWave); } catch (e) {}
          }
        }
      }
    } else {
      const nx = (target.x - e.x) / d, ny = (target.y - e.y) / d;
      e.x += nx * step; e.y += ny * step;
    }
    if (e.flash > 0) e.flash -= dt * 8;
  }

  // Towers shoot
  for (const t of state.towers) {
    const mult = towerDmgMult(t);   // ascension damage scaling
    // Continuous-fire upgrades bypass the cooldown system.
    const u = t.upgrade ? UPGRADE_DEFS[t.upgrade] : null;
    if (u && u.mode === 'beam') {
      // Single-target beam: lock onto the furthest-along enemy in range.
      const range = u.range * CELL;
      let tgt = null, bestWp = -1;
      for (const e of state.enemies) {
        if (!e.dead && !e.reached && dist(t, e) <= range && e.wpIdx > bestWp) { tgt = e; bestWp = e.wpIdx; }
      }
      t.rayTarget = tgt;
      if (tgt) { damageEnemyContinuous(tgt, u.dps * mult * dt); t.aimAngle = Math.atan2(tgt.y - t.y, tgt.x - t.x); }
      continue;
    }
    if (u && u.mode === 'aoe') {
      // Continuous AoE: damage everything in range, plus optional slow/burn.
      const range = u.range * CELL;
      const inRange = state.enemies.filter(e => !e.dead && !e.reached && dist(t, e) <= range);
      for (const e of inRange) {
        if (u.slowMult != null) applySlow(e, u.slowMult, 0.25);
        if (u.burn) applyBurn(e, u.dps * mult, 0.25);
        damageEnemyContinuous(e, u.dps * mult * dt);
      }
      if (inRange.length > 0 && Math.random() < 0.14) {
        const angle = Math.random() * Math.PI * 2, radius = Math.random() * range;
        state.particles.push({ type:'spark', x:t.x+Math.cos(angle)*radius, y:t.y+Math.sin(angle)*radius, vx:0, vy:-18, life:0.4, maxLife:0.4, color:u.color, r:4 });
      }
      continue;
    }

    t.cooldown = (t.cooldown || 0) - dt;
    if (t.cooldown > 0) continue;
    const def = TOWER_TYPES[t.type];
    const rangePixels = def.range * CELL;

    // Rate-based AoE upgrades (Sun God / Supernova): zap all in range on a cooldown.
    if (u && u.mode === 'rate') {
      const range = u.range * CELL;
      const inRange = state.enemies.filter(e => !e.dead && !e.reached && dist(t, e) <= range);
      if (inRange.length === 0) continue;
      t.cooldown = 1 / u.rate;
      for (const e of inRange) {
        damageEnemy(e, u.dmg * mult);
        state.particles.push({ type:'arc', x1:t.x, y1:t.y, x2:e.x, y2:e.y, life:0.08, maxLife:0.08, color:u.color });
      }
      state.particles.push({ type:'ring', x:t.x, y:t.y, r:0, maxR:range, life:0.18, maxLife:0.18, color:u.color });
      continue;
    }

    // Warship: cannon volley hits ALL enemies in range (like Tesla, blue arcs)
    if (t.type === 'warship') {
      const inRange = state.enemies.filter(e => !e.dead && !e.reached && dist(t, e) <= rangePixels);
      if (inRange.length === 0) continue;
      t.cooldown = 1 / def.rate;
      for (const e of inRange) {
        damageEnemy(e, def.dmg * mult);
        state.particles.push({ type:'arc', x1:t.x, y1:t.y, x2:e.x, y2:e.y, life:0.1, maxLife:0.1, color:def.color });
        state.particles.push({ type:'spark', x:e.x, y:e.y, vx:0, vy:0, life:0.12, maxLife:0.12, color:def.color, r:7 });
      }
      continue;
    }

    // Tesla / God / Black Hole: hit ALL enemies in range at once — no targeting.
    // Black Hole also drags everything caught in its pull (gravity slow).
    if (t.type === 'tesla' || t.type === 'god' || t.type === 'blackhole') {
      const inRange = state.enemies.filter(e => !e.dead && !e.reached && dist(t, e) <= rangePixels);
      if (inRange.length === 0) continue;
      t.cooldown = 1 / def.rate;
      for (const e of inRange) {
        damageEnemy(e, def.dmg * mult);
        if (t.type === 'blackhole') applySlow(e, def.slowMult, def.slowDur);
        // Arc lightning particle
        state.particles.push({ type:'arc', x1:t.x, y1:t.y, x2:e.x, y2:e.y, life:0.1, maxLife:0.1, color:def.color });
        state.particles.push({ type:'spark', x:e.x, y:e.y, vx:0, vy:0, life:0.12, maxLife:0.12, color:def.color, r:7 });
      }
      continue;
    }

    // All other towers: find best target
    let target = null, bestWp = -1;
    for (const e of state.enemies) {
      if (e.dead || e.reached) continue;
      if (dist(t, e) <= rangePixels && e.wpIdx > bestWp) { target = e; bestWp = e.wpIdx; }
    }
    if (!target) continue;
    t.cooldown = 1 / def.rate;
    t.aimAngle = Math.atan2(target.y - t.y, target.x - t.x);

    if (t.type === 'nuke') {
      // Slow missile that detonates
      state.projectiles.push({
        ptype:'nuke', x:t.x, y:t.y, tx:target.x, ty:target.y, target,
        dmg:def.dmg * mult, splashR:def.splash*CELL, speed:140, color:def.color, r:9, hit:false,
      });
    } else if (t.type === 'cryo') {
      // Ice projectile → splash slow
      state.projectiles.push({
        ptype:'cryo', x:t.x, y:t.y, tx:target.x, ty:target.y, target,
        dmg:def.dmg * mult, splashR:def.splash*CELL, speed:280, color:def.color, r:6,
        slowMult:def.slowMult, slowDur:def.slowDur, hit:false,
      });
    } else if (t.type === 'fire') {
      // Fire splash projectile
      state.projectiles.push({
        ptype:'fire', x:t.x, y:t.y, tx:target.x, ty:target.y, target,
        dmg:def.dmg * mult, splashR:def.splash*CELL, speed:260, color:def.color, r:5,
        burnDps:def.burnDps * mult, burnDur:def.burnDur, hit:false,
      });
    } else {
      // Single target (basic, sniper)
      const projSpeed = t.type === 'sniper' ? 500 : 300;
      state.projectiles.push({
        ptype:'single', x:t.x, y:t.y, tx:target.x, ty:target.y, target,
        dmg:def.dmg * mult, speed:projSpeed, color:def.color, r:4, hit:false,
      });
    }
  }

  // Move projectiles
  for (const p of state.projectiles) {
    if (p.hit) continue;
    if (p.target && !p.target.dead && !p.target.reached) { p.tx = p.target.x; p.ty = p.target.y; }
    const d = dist(p, {x:p.tx, y:p.ty});
    const step = p.speed * dt;
    const targetGone = !p.target || p.target.dead || p.target.reached;

    if (d <= step + 1 || (targetGone && p.ptype === 'single')) {
      if (p.ptype === 'single') {
        if (!targetGone) damageEnemy(p.target, p.dmg);
        p.hit = true;
      } else {
        const ex = !targetGone ? p.target.x : p.tx;
        const ey = !targetGone ? p.target.y : p.ty;
        if (p.ptype === 'nuke') {
          for (const e of state.enemies) {
            if (!e.dead && !e.reached && dist({x:ex,y:ey}, e) <= p.splashR) damageEnemy(e, p.dmg);
          }
          for (let i = 1; i <= 3; i++)
            state.particles.push({ type:'ring', x:ex, y:ey, r:0, maxR:p.splashR*i/3, life:0.55, maxLife:0.55, color:p.color });
          for (let i = 0; i < 18; i++) {
            const angle = Math.random() * Math.PI * 2, spd = 100 + Math.random() * 200;
            state.particles.push({ type:'spark', x:ex, y:ey, vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd, life:0.8, maxLife:0.8, color:'#e1bee7', r:5 });
          }
        } else if (p.ptype === 'cryo') {
          for (const e of state.enemies) {
            if (!e.dead && !e.reached && dist({x:ex,y:ey}, e) <= p.splashR) {
              damageEnemy(e, p.dmg);
              applySlow(e, p.slowMult, p.slowDur);
            }
          }
          state.particles.push({ type:'ring', x:ex, y:ey, r:0, maxR:p.splashR, life:0.4, maxLife:0.4, color:p.color });
          for (let i = 0; i < 8; i++) {
            const angle = Math.random() * Math.PI * 2, spd = 30 + Math.random() * 50;
            state.particles.push({ type:'spark', x:ex, y:ey, vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd, life:0.5, maxLife:0.5, color:'#e1f5fe', r:4 });
          }
        } else if (p.ptype === 'fire') {
          for (const e of state.enemies) {
            if (!e.dead && !e.reached && dist({x:ex,y:ey}, e) <= p.splashR) {
              damageEnemy(e, p.dmg);
              applyBurn(e, p.burnDps, p.burnDur);
            }
          }
          state.particles.push({ type:'ring', x:ex, y:ey, r:0, maxR:p.splashR, life:0.35, maxLife:0.35, color:p.color });
        }
        p.hit = true;
      }
    } else {
      const nx = (p.tx - p.x) / d, ny = (p.ty - p.y) / d;
      p.x += nx * step; p.y += ny * step;
    }
  }

  // Decay particles
  for (const p of state.particles) {
    p.life -= dt;
    if (p.type === 'ring') p.r = p.maxR * (1 - p.life / p.maxLife);
  }

  state.enemies = state.enemies.filter(e => !e.dead && !e.reached);
  state.projectiles = state.projectiles.filter(p => !p.hit);
  state.particles = state.particles.filter(p => p.life > 0);

  if (state.waveActive && state.waveSpawned >= state.waveTotal && state.enemies.length === 0) {
    state.waveActive = false;
    state.gold += 40 + state.wave * 8;
    if (state.autoStart) startWave();
  }
}

// ─── Drawing ─────────────────────────────────────────────────────────────────

function draw() {
  ctx.clearRect(0, 0, CW, CH);
  drawBackground();
  drawPath();
  drawGrid();
  drawTowers();
  drawEnemies();
  drawProjectiles();
  drawParticles();
  if (state.screenFlash > 0) {
    ctx.globalAlpha = Math.min(0.6, state.screenFlash);
    ctx.fillStyle = '#fff3e0';
    ctx.fillRect(0, TOP_H, COLS * CELL, ROWS * CELL);
    ctx.globalAlpha = 1;
  }
  drawTopBar();
  drawPanel();
  const infoTower = state.selectedPlacedTower || state.hoveredTower;
  if (infoTower) drawRangeCircle(infoTower);
  if (state.selectedPlacedTower && state.towers.includes(state.selectedPlacedTower)) {
    drawTowerActions(state.selectedPlacedTower);
  }
  if (state.hoverCell && !state.gameOver) drawPlacementPreview();
  if (state.gameOver) drawGameOver();
  if (state.mapDropdownOpen) drawMapDropdown();
}

function drawMapDropdown() {
  const x = 620, y = 42, w = 130, optH = 28;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, 0, CW, CH);
  for (let i = 0; i < MAP_NAMES.length; i++) {
    const oy = y + i * optH;
    const selected = i === activeMap;
    ctx.fillStyle = selected ? '#1b5e20' : '#0d2137';
    ctx.fillRect(x, oy, w, optH);
    ctx.strokeStyle = selected ? '#4caf50' : '#37474f';
    ctx.lineWidth = 1;
    ctx.strokeRect(x, oy, w, optH);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(MAP_NAMES[i], x + w/2, oy + optH/2 + 4);
  }
}

function drawBackground() {
  ctx.fillStyle = '#263238';
  ctx.fillRect(0, TOP_H, COLS * CELL, ROWS * CELL);
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, CW, TOP_H);
  ctx.fillStyle = '#16213e';
  ctx.fillRect(COLS * CELL, 0, PANEL_W, CH);
  // Draw lake tiles
  const now = Date.now();
  for (const [c,r] of (LAKES[activeMap] || [])) {
    ctx.fillStyle = '#0d47a1';
    ctx.fillRect(c*CELL+1, r*CELL+TOP_H+1, CELL-2, CELL-2);
    // Animated shimmer
    const shimmer = 0.15 + 0.1 * Math.sin(now * 0.002 + c * 0.8 + r * 1.3);
    ctx.globalAlpha = shimmer;
    ctx.fillStyle = '#64b5f6';
    ctx.fillRect(c*CELL+3, r*CELL+TOP_H+3, CELL-6, (CELL-6)/2);
    ctx.globalAlpha = 1;
    ctx.strokeStyle = '#1565c0';
    ctx.lineWidth = 1;
    ctx.strokeRect(c*CELL+1, r*CELL+TOP_H+1, CELL-2, CELL-2);
  }
}

function drawPath() {
  ctx.fillStyle = '#5d4037';
  for (const [c,r] of ACTIVE_PATH) ctx.fillRect(c*CELL+1, r*CELL+TOP_H+1, CELL-2, CELL-2);
  ctx.strokeStyle = '#795548';
  ctx.lineWidth = 1;
  for (const [c,r] of ACTIVE_PATH) ctx.strokeRect(c*CELL+1, r*CELL+TOP_H+1, CELL-2, CELL-2);
}

function drawGrid() {
  ctx.strokeStyle = '#37474f';
  ctx.lineWidth = 0.5;
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c*CELL, TOP_H); ctx.lineTo(c*CELL, TOP_H+ROWS*CELL); ctx.stroke();
  }
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, TOP_H+r*CELL); ctx.lineTo(COLS*CELL, TOP_H+r*CELL); ctx.stroke();
  }
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#66bb6a';
  ctx.fillText('START', WAYPOINTS[0].x, WAYPOINTS[0].y + 4);
  ctx.fillStyle = '#ef5350';
  const last = WAYPOINTS[WAYPOINTS.length - 1];
  ctx.fillText('END', last.x, last.y + 4);
}

function drawTowers() {
  const now = Date.now();
  for (const t of state.towers) {
    const def = TOWER_TYPES[t.type];
    // Base + body
    ctx.fillStyle = '#37474f';
    ctx.fillRect(t.x - 16, t.y - 16, 32, 32);
    ctx.fillStyle = def.color;
    ctx.fillRect(t.x - 12, t.y - 12, 24, 24);

    // Cooldown arc
    const maxCd = 1 / (t.upgrade === 'sungod' ? SUNGOD.rate : t.upgrade === 'supernova' ? SUPERNOVA.rate : def.rate);
    if (t.cooldown > 0) {
      const prog = 1 - t.cooldown / maxCd;
      ctx.strokeStyle = 'rgba(255,255,255,0.28)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(t.x, t.y, 17, -Math.PI/2, -Math.PI/2 + prog * Math.PI * 2);
      ctx.stroke();
    }

    if (t.upgrade === 'sungod') {
      const pulse = 0.5 + 0.3 * Math.sin(now / 200 + t.x * 0.05);
      ctx.globalAlpha = pulse * 0.22;
      ctx.fillStyle = SUNGOD.color;
      ctx.beginPath(); ctx.arc(t.x, t.y, 26, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = SUNGOD.color;
      ctx.beginPath(); ctx.arc(t.x, t.y, 18, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff8e1';
      ctx.beginPath(); ctx.arc(t.x, t.y, 10, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = SUNGOD.color;
      ctx.lineWidth = 3;
      for (let i = 0; i < 8; i++) {
        const a = (i/8)*Math.PI*2 + now*0.001;
        ctx.globalAlpha = pulse;
        ctx.beginPath();
        ctx.moveTo(t.x + Math.cos(a)*22, t.y + Math.sin(a)*22);
        ctx.lineTo(t.x + Math.cos(a)*34, t.y + Math.sin(a)*34);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      continue;
    }

    if (t.upgrade === 'deathray') {
      // Overdraw base red
      ctx.fillStyle = DEATHRAY.color;
      ctx.fillRect(t.x - 12, t.y - 12, 24, 24);
      const pulse = 0.5 + 0.4 * Math.sin(now / 100 + t.x * 0.1);
      ctx.strokeStyle = `rgba(255,23,68,${pulse})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(t.x, t.y, 16 + 4 * Math.sin(now / 70), 0, Math.PI * 2);
      ctx.stroke();
      // Beam to target
      if (t.rayTarget && !t.rayTarget.dead && !t.rayTarget.reached) {
        ctx.globalAlpha = 0.3;
        ctx.strokeStyle = DEATHRAY.color;
        ctx.lineWidth = 8;
        ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(t.rayTarget.x, t.rayTarget.y); ctx.stroke();
        ctx.globalAlpha = 1;
        ctx.strokeStyle = DEATHRAY.color;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(t.rayTarget.x, t.rayTarget.y); ctx.stroke();
        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
        ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(t.rayTarget.x, t.rayTarget.y); ctx.stroke();
      }
      continue;
    }

    if (t.upgrade === 'permafrost') {
      const pulse = 0.4 + 0.3 * Math.sin(now / 150 + t.x * 0.05);
      ctx.globalAlpha = pulse * 0.45;
      ctx.fillStyle = PERMAFROST.color;
      ctx.beginPath(); ctx.arc(t.x, t.y, 28, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.strokeStyle = PERMAFROST.color;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(t.x, t.y, 22, 0, Math.PI*2); ctx.stroke();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2 + now * 0.0008;
        ctx.beginPath();
        ctx.moveTo(t.x, t.y);
        ctx.lineTo(t.x + Math.cos(a) * 16, t.y + Math.sin(a) * 16);
        ctx.stroke();
      }
      continue;
    }

    if (t.upgrade === 'supernova') {
      const pulse = 0.5 + 0.4 * Math.sin(now / 150 + t.x * 0.05);
      ctx.globalAlpha = pulse * 0.35;
      ctx.fillStyle = SUPERNOVA.color;
      ctx.beginPath(); ctx.arc(t.x, t.y, 32, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = SUPERNOVA.color;
      ctx.beginPath(); ctx.arc(t.x, t.y, 20, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff8e1';
      ctx.beginPath(); ctx.arc(t.x, t.y, 10, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = SUPERNOVA.color;
      ctx.lineWidth = 4;
      for (let i = 0; i < 12; i++) {
        const a = (i/12)*Math.PI*2 + now*0.002;
        ctx.globalAlpha = pulse;
        ctx.beginPath();
        ctx.moveTo(t.x + Math.cos(a)*24, t.y + Math.sin(a)*24);
        ctx.lineTo(t.x + Math.cos(a)*38, t.y + Math.sin(a)*38);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      continue;
    }

    if (t.upgrade === 'omegaray') {
      ctx.fillStyle = OMEGARAY.color;
      ctx.fillRect(t.x - 12, t.y - 12, 24, 24);
      const pulse = 0.5 + 0.4 * Math.sin(now / 80 + t.x * 0.1);
      ctx.strokeStyle = `rgba(255,0,85,${pulse})`;
      ctx.lineWidth = 4;
      ctx.beginPath(); ctx.arc(t.x, t.y, 18 + 5 * Math.sin(now / 60), 0, Math.PI * 2); ctx.stroke();
      if (t.rayTarget && !t.rayTarget.dead && !t.rayTarget.reached) {
        ctx.globalAlpha = 0.5; ctx.strokeStyle = OMEGARAY.color; ctx.lineWidth = 12;
        ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(t.rayTarget.x, t.rayTarget.y); ctx.stroke();
        ctx.globalAlpha = 1; ctx.strokeStyle = OMEGARAY.color; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(t.rayTarget.x, t.rayTarget.y); ctx.stroke();
        ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(t.rayTarget.x, t.rayTarget.y); ctx.stroke();
      }
      continue;
    }

    if (t.upgrade === 'absolutezero') {
      const pulse = 0.5 + 0.4 * Math.sin(now / 100 + t.x * 0.05);
      ctx.globalAlpha = pulse * 0.65;
      ctx.fillStyle = ABSOLUTEZERO.color;
      ctx.beginPath(); ctx.arc(t.x, t.y, 32, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.strokeStyle = ABSOLUTEZERO.color;
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(t.x, t.y, 24, 0, Math.PI*2); ctx.stroke();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2.5;
      for (let i = 0; i < 12; i++) {
        const a = (i / 12) * Math.PI * 2 + now * 0.001;
        ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(t.x + Math.cos(a) * 20, t.y + Math.sin(a) * 20); ctx.stroke();
      }
      continue;
    }

    if (t.upgrade === 'railgun') {
      ctx.fillStyle = RAILGUN.color;
      ctx.fillRect(t.x - 12, t.y - 12, 24, 24);
      const pulse = 0.5 + 0.4 * Math.sin(now / 90 + t.x * 0.1);
      ctx.strokeStyle = `rgba(255,68,68,${pulse})`;
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(t.x, t.y, 16 + 3 * Math.sin(now / 70), 0, Math.PI * 2); ctx.stroke();
      if (t.rayTarget && !t.rayTarget.dead && !t.rayTarget.reached) {
        ctx.globalAlpha = 0.4; ctx.strokeStyle = RAILGUN.color; ctx.lineWidth = 6;
        ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(t.rayTarget.x, t.rayTarget.y); ctx.stroke();
        ctx.globalAlpha = 1; ctx.strokeStyle = RAILGUN.color; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(t.rayTarget.x, t.rayTarget.y); ctx.stroke();
        ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(t.rayTarget.x, t.rayTarget.y); ctx.stroke();
      }
      continue;
    }

    if (t.upgrade === 'inferno') {
      const pulse = 0.4 + 0.35 * Math.sin(now / 80 + t.x * 0.1);
      ctx.globalAlpha = pulse * 0.55;
      ctx.fillStyle = INFERNO.color;
      ctx.beginPath(); ctx.arc(t.x, t.y, 28, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#ff8c00';
      ctx.beginPath(); ctx.arc(t.x, t.y, 22, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffcc02';
      ctx.beginPath(); ctx.arc(t.x, t.y, 14, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 0.4 + 0.35 * Math.sin(now / 60 + t.x);
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(t.x, t.y, 8, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
      continue;
    }

    if (t.upgrade === 'godshot') {
      ctx.fillStyle = '#6a0080';
      ctx.fillRect(t.x - 12, t.y - 12, 24, 24);
      const pulse = 0.5 + 0.4 * Math.sin(now / 80 + t.x * 0.1);
      ctx.strokeStyle = `rgba(213,0,249,${pulse})`;
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(t.x, t.y, 18 + 5 * Math.sin(now / 60), 0, Math.PI * 2); ctx.stroke();
      if (t.rayTarget && !t.rayTarget.dead && !t.rayTarget.reached) {
        ctx.globalAlpha = 0.5; ctx.strokeStyle = GODSHOT.color; ctx.lineWidth = 14;
        ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(t.rayTarget.x, t.rayTarget.y); ctx.stroke();
        ctx.globalAlpha = 1; ctx.strokeStyle = GODSHOT.color; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(t.rayTarget.x, t.rayTarget.y); ctx.stroke();
        ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(t.rayTarget.x, t.rayTarget.y); ctx.stroke();
      }
      continue;
    }

    if (t.upgrade === 'broadside') {
      ctx.fillStyle = BROADSIDE.color;
      ctx.fillRect(t.x - 12, t.y - 12, 24, 24);
      const pulse = 0.4 + 0.3 * Math.sin(now / 100 + t.x * 0.08);
      ctx.globalAlpha = pulse * 0.4;
      ctx.fillStyle = '#29b6f6';
      ctx.beginPath(); ctx.arc(t.x, t.y, 26, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.strokeStyle = '#29b6f6';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(t.x, t.y, 18, 0, Math.PI*2); ctx.stroke();
      for (let i = 0; i < 6; i++) {
        const a = (i/6)*Math.PI*2 + now*0.0015;
        ctx.fillStyle = '#b3e5fc';
        ctx.beginPath(); ctx.arc(t.x + Math.cos(a)*16, t.y + Math.sin(a)*16, 3, 0, Math.PI*2); ctx.fill();
      }
      continue;
    }

    if (t.upgrade === 'cannonade') {
      ctx.fillStyle = CANNONADE.color;
      ctx.fillRect(t.x - 12, t.y - 12, 24, 24);
      const pulse = 0.4 + 0.3 * Math.sin(now / 120 + t.x * 0.1);
      ctx.strokeStyle = `rgba(41,182,246,${pulse})`;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(t.x, t.y, 16 + 2 * Math.sin(now / 80), 0, Math.PI*2); ctx.stroke();
      for (let i = 0; i < 4; i++) {
        const a = (i/4)*Math.PI*2 + now*0.001;
        ctx.fillStyle = '#e1f5fe';
        ctx.beginPath(); ctx.arc(t.x + Math.cos(a)*12, t.y + Math.sin(a)*12, 2.5, 0, Math.PI*2); ctx.fill();
      }
      continue;
    }

    if (t.upgrade === 'divinity') {
      ctx.fillStyle = DIVINITY.color;
      ctx.fillRect(t.x - 12, t.y - 12, 24, 24);
      const pulse = 0.55 + 0.4 * Math.sin(now / 90 + t.x * 0.08);
      ctx.globalAlpha = pulse * 0.55;
      ctx.fillStyle = '#fff8e1';
      ctx.beginPath(); ctx.arc(t.x, t.y, 34, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(t.x, t.y, 13, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#ffd700';
      ctx.lineWidth = 3;
      for (let i = 0; i < 12; i++) {
        const a = (i/12)*Math.PI*2 + now*0.0015;
        ctx.globalAlpha = pulse;
        ctx.beginPath();
        ctx.moveTo(t.x + Math.cos(a)*20, t.y + Math.sin(a)*20);
        ctx.lineTo(t.x + Math.cos(a)*38, t.y + Math.sin(a)*38);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      continue;
    }

    if (t.upgrade === 'godray') {
      ctx.fillStyle = GODRAY.color;
      ctx.fillRect(t.x - 12, t.y - 12, 24, 24);
      const pulse = 0.5 + 0.35 * Math.sin(now / 110 + t.x * 0.1);
      ctx.globalAlpha = pulse * 0.45;
      ctx.fillStyle = '#fffde7';
      ctx.beginPath(); ctx.arc(t.x, t.y, 28, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(t.x, t.y, 10, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#ffd700';
      ctx.lineWidth = 2.5;
      for (let i = 0; i < 8; i++) {
        const a = (i/8)*Math.PI*2 + now*0.001;
        ctx.globalAlpha = pulse;
        ctx.beginPath();
        ctx.moveTo(t.x + Math.cos(a)*16, t.y + Math.sin(a)*16);
        ctx.lineTo(t.x + Math.cos(a)*30, t.y + Math.sin(a)*30);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      continue;
    }

    if (t.upgrade === 'singularity') {
      const spin = now * 0.008 + t.x;
      ctx.fillStyle = SINGULARITY.color; ctx.fillRect(t.x - 12, t.y - 12, 24, 24);
      const pulse = 0.5 + 0.4 * Math.sin(now / 90);
      ctx.globalAlpha = pulse * 0.5;
      ctx.fillStyle = '#e040fb';
      ctx.beginPath(); ctx.arc(t.x, t.y, 36, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(t.x, t.y, 13, 0, Math.PI*2); ctx.fill();
      for (let r = 0; r < 3; r++) {
        ctx.strokeStyle = ['#e040fb','#ea80fc','#fff'][r]; ctx.lineWidth = 2.5 - r*0.5;
        ctx.beginPath(); ctx.arc(t.x, t.y, 16 + r*5, spin*(1+r*0.3), spin*(1+r*0.3) + Math.PI*1.5); ctx.stroke();
      }
      continue;
    }

    if (t.upgrade === 'quasar') {
      const spin = now * 0.006 + t.x;
      ctx.fillStyle = QUASAR.color; ctx.fillRect(t.x - 12, t.y - 12, 24, 24);
      ctx.globalAlpha = 0.4 + 0.3 * Math.sin(now / 120);
      ctx.fillStyle = '#b388ff';
      ctx.beginPath(); ctx.arc(t.x, t.y, 28, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#1a0a2e';
      ctx.beginPath(); ctx.arc(t.x, t.y, 12, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#e1bee7'; ctx.lineWidth = 3;
      for (let i = 0; i < 2; i++) { const a = spin + i*Math.PI;
        ctx.beginPath(); ctx.moveTo(t.x + Math.cos(a)*10, t.y + Math.sin(a)*10);
        ctx.lineTo(t.x + Math.cos(a)*34, t.y + Math.sin(a)*34); ctx.stroke(); }
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(t.x, t.y, 16, spin, spin + Math.PI*1.5); ctx.stroke();
      continue;
    }

    if (t.type === 'blackhole') {
      const spin = now * 0.004 + t.x;
      ctx.globalAlpha = 0.3 + 0.2 * Math.sin(now / 200 + t.x);
      ctx.fillStyle = '#7e57c2';
      ctx.beginPath(); ctx.arc(t.x, t.y, 20, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#1a0a2e';
      ctx.beginPath(); ctx.arc(t.x, t.y, 11, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#b388ff'; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.arc(t.x, t.y, 15, spin, spin + Math.PI*1.4); ctx.stroke();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(t.x, t.y, 15, spin + Math.PI, spin + Math.PI*1.7); ctx.stroke();
      continue;
    }

    if (t.type === 'god') {
      const pulse = 0.45 + 0.35 * Math.sin(now / 130 + t.x * 0.08);
      ctx.globalAlpha = pulse * 0.4;
      ctx.fillStyle = '#fffde7';
      ctx.beginPath(); ctx.arc(t.x, t.y, 22, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.strokeStyle = '#ffd700';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(t.x, t.y, 14 + 2 * Math.sin(now / 90), 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('✦', t.x, t.y + 5);
      continue;
    }

    if (t.type === 'warship') {
      const pulse = 0.4 + 0.35 * Math.sin(now / 110 + t.x * 0.1);
      ctx.strokeStyle = `rgba(79,195,247,${pulse})`;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(t.x, t.y, 15 + 2 * Math.sin(now / 80), 0, Math.PI*2); ctx.stroke();
      ctx.strokeStyle = '#e1f5fe';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(t.x - 8, t.y); ctx.lineTo(t.x + 8, t.y);
      ctx.moveTo(t.x, t.y - 8); ctx.lineTo(t.x, t.y + 8);
      ctx.stroke();
      continue;
    }

    if (t.type === 'tesla') {
      // Pulsing electric ring
      const pulse = 0.4 + 0.35 * Math.sin(now / 120 + t.x * 0.1);
      ctx.strokeStyle = `rgba(255,241,118,${pulse})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(t.x, t.y, 14 + 3 * Math.sin(now / 80), 0, Math.PI * 2);
      ctx.stroke();
      // Crosshair
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(t.x - 6, t.y); ctx.lineTo(t.x + 6, t.y);
      ctx.moveTo(t.x, t.y - 6); ctx.lineTo(t.x, t.y + 6);
      ctx.stroke();
      continue;
    }

    if (t.type === 'cryo') {
      // Snowflake arms
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      for (let i = 0; i < 6; i++) {
        const angle = (i / 6) * Math.PI * 2 + now * 0.001;
        ctx.beginPath();
        ctx.moveTo(t.x, t.y);
        ctx.lineTo(t.x + Math.cos(angle) * 12, t.y + Math.sin(angle) * 12);
        ctx.stroke();
      }
      continue;
    }

    if (t.type === 'fire') {
      const flicker = 0.35 + 0.3 * Math.sin(now / 80 + t.x);
      ctx.globalAlpha = flicker;
      ctx.fillStyle = '#ffcc02';
      ctx.beginPath();
      ctx.arc(t.x, t.y - 7, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    if (t.type === 'nuke') {
      ctx.strokeStyle = 'rgba(206,147,216,0.45)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(t.x, t.y, 14, 0, Math.PI * 2);
      ctx.stroke();
    }

    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.rotate(t.aimAngle || 0);
    ctx.fillStyle = '#263238';
    if (t.type === 'nuke') {
      ctx.fillStyle = '#b0bec5';
      ctx.fillRect(2, -5, 16, 10);
      ctx.fillStyle = '#ff5722';
      ctx.beginPath();
      ctx.moveTo(18,-5); ctx.lineTo(24,0); ctx.lineTo(18,5); ctx.closePath();
      ctx.fill();
    } else {
      const blen = t.type === 'sniper' ? 22 : 14;
      const bh = t.type === 'sniper' ? 4 : 6;
      ctx.fillRect(2, -bh/2, blen, bh);
    }
    ctx.restore();
  }

  // Ascension aura + level badge (drawn on top of every tower so it shows over
  // the bespoke upgrade visuals). Intensity scales with ascension level.
  const now2 = Date.now();
  for (const t of state.towers) {
    if (!t.ascend) continue;
    const lvl = t.ascend;
    const glow = 0.25 + 0.2 * Math.sin(now2 / 180 + t.x);
    ctx.globalAlpha = Math.min(0.5, glow + lvl * 0.015);
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(t.x, t.y, 19 + Math.min(8, lvl * 0.4), 0, Math.PI*2); ctx.stroke();
    ctx.globalAlpha = 1;
    // Level badge, top-right of the tower
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(t.x + 6, t.y - 18, 16, 12);
    ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 1;
    ctx.strokeRect(t.x + 6, t.y - 18, 16, 12);
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(lvl > 99 ? '99' : String(lvl), t.x + 14, t.y - 9);
  }
}

function drawEnemies() {
  for (const e of state.enemies) {
    const frozen = e.slowTimer > 0;
    const burning = e.burnTimer > 0;

    if (burning) {
      ctx.globalAlpha = 0.55;
      ctx.fillStyle = '#ff6e00';
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.r + 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    if (frozen) {
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = '#81d4fa';
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.r + 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    if (e.isBoss) {
      ctx.fillStyle = e.flash > 0 ? '#fff' : '#4a148c';
      ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#ffd700';
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('BOSS', e.x, e.y + 3);
    } else {
      const et = ENEMY_TYPES[e.etype] || ENEMY_TYPES.normal;
      ctx.fillStyle = e.flash > 0 ? '#fff' : (frozen ? '#b3e5fc' : et.color);
      ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = frozen ? '#0288d1' : et.stroke;
      ctx.lineWidth = 2;
      ctx.stroke();
      const wp = WAYPOINTS[Math.min(e.wpIdx, WAYPOINTS.length - 1)];
      const angle = Math.atan2(wp.y - e.y, wp.x - e.x);
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(e.x + Math.cos(angle)*4, e.y + Math.sin(angle)*4, 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(e.x + Math.cos(angle)*5, e.y + Math.sin(angle)*5, 1.5, 0, Math.PI * 2); ctx.fill();
    }

    const bw = e.isBoss ? 40 : 24, bh = e.isBoss ? 6 : 4, bx = e.x - bw/2, by = e.y - e.r - (e.isBoss ? 12 : 8);
    ctx.fillStyle = '#222';
    ctx.fillRect(bx, by, bw, bh);
    const pct = e.hp / e.maxHp;
    ctx.fillStyle = pct > 0.5 ? '#66bb6a' : pct > 0.25 ? '#ffa726' : '#ef5350';
    ctx.fillRect(bx, by, bw * pct, bh);
  }
}

function drawProjectiles() {
  for (const p of state.projectiles) {
    if (p.hit) continue;
    if (p.ptype === 'nuke') {
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r + 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    } else if (p.ptype === 'cryo') {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.stroke();
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawParticles() {
  for (const p of state.particles) {
    const alpha = Math.max(0, p.life / p.maxLife);
    ctx.globalAlpha = alpha;
    if (p.type === 'spark') {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * alpha, 0, Math.PI * 2);
      ctx.fill();
    } else if (p.type === 'ring') {
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(0, p.r), 0, Math.PI * 2);
      ctx.stroke();
    } else if (p.type === 'arc') {
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 1.5 + alpha * 1.5;
      ctx.beginPath();
      // Jagged arc with midpoint wobble
      const mx = (p.x1 + p.x2) / 2 + (Math.random() - 0.5) * 14;
      const my = (p.y1 + p.y2) / 2 + (Math.random() - 0.5) * 14;
      ctx.moveTo(p.x1, p.y1);
      ctx.quadraticCurveTo(mx, my, p.x2, p.y2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
}

// Single source of truth for top-bar button hit regions — used by both draw and input.
function topBarButtons() {
  return {
    map:   { x: 620,            y: 8, w: 130, h: 34 },
    start: { x: COLS*CELL - 145, y: 8, w: 135, h: 34 },
    pause: { x: CW - 204,       y: 8, w: 62,  h: 34 },
    auto:  { x: CW - 136,       y: 8, w: 62,  h: 34 },
    speed: { x: CW - 68,        y: 8, w: 58,  h: 34 },
  };
}
function inRect(mx, my, r) { return mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h; }

function drawTopBar() {
  const B = topBarButtons();
  ctx.fillStyle = '#1a237e';
  ctx.fillRect(0, 0, CW, TOP_H);
  ctx.strokeStyle = '#3949ab';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, TOP_H); ctx.lineTo(CW, TOP_H); ctx.stroke();

  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#90caf9';
  ctx.fillText(`Wave: ${state.wave}`, 12, 32);
  ctx.fillStyle = state.lives > 5 ? '#a5d6a7' : '#ef9a9a';
  ctx.fillText(`Lives: ${state.lives}`, 155, 32);
  ctx.fillStyle = '#fff176';
  ctx.fillText(`Gold: ${state.gold.toLocaleString()}`, 300, 32);
  if (state.waveActive) {
    ctx.fillStyle = '#ffcc80';
    ctx.fillText(`Enemies: ${state.waveTotal - state.waveSpawned + state.enemies.length}`, 480, 32);
  } else if (state.wave > 0) {
    ctx.fillStyle = '#a5d6a7';
    ctx.fillText(`+${40 + state.wave * 8}g bonus!`, 480, 32);
  }

  drawButton(B.start.x, B.start.y, B.start.w, B.start.h,
    state.waveActive ? `Wave ${state.wave} active` : `Start Wave ${state.wave+1}`,
    state.waveActive ? '#37474f' : '#1b5e20',
    state.waveActive ? '#607d8b' : '#4caf50');

  const mapBtnEnabled = state.wave === 0;
  drawButton(B.map.x, B.map.y, B.map.w, B.map.h, `Map: ${MAP_NAMES[activeMap]} ▾`,
    mapBtnEnabled ? '#0d2137' : '#1c2a1c',
    mapBtnEnabled ? '#4caf50' : '#37474f');

  drawButton(B.speed.x, B.speed.y, B.speed.w, B.speed.h,
    state.speed === 1 ? '1x' : state.speed === 2 ? '2x' : '4x',
    state.speed === 1 ? '#1a237e' : state.speed === 2 ? '#4a1080' : '#7b1a00',
    state.speed === 1 ? '#3f51b5' : state.speed === 2 ? '#9c27b0' : '#ff5722');

  drawButton(B.auto.x, B.auto.y, B.auto.w, B.auto.h, 'Auto',
    state.autoStart ? '#1b3a1b' : '#1a237e',
    state.autoStart ? '#4caf50' : '#37474f');

  drawButton(B.pause.x, B.pause.y, B.pause.w, B.pause.h, state.paused ? '►' : 'II',
    state.paused ? '#3a2a10' : '#1a237e',
    state.paused ? '#ffb300' : '#37474f');
}

function drawButton(x, y, w, h, label, bg, border) {
  ctx.fillStyle = bg;
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = border;
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, w, h);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(label, x + w/2, y + h/2 + 4);
}

const CARD_H = 60;
const CARD_GAP = 2;
const PANEL_HEADER = 26;

function drawPanel() {
  const px = COLS * CELL;
  ctx.fillStyle = '#0d1b2a';
  ctx.fillRect(px, TOP_H, PANEL_W, ROWS * CELL);
  ctx.fillStyle = '#90caf9';
  ctx.font = 'bold 13px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('TOWERS', px + PANEL_W/2, TOP_H + 22);

  let ty = TOP_H + PANEL_HEADER;
  for (const [key, def] of Object.entries(TOWER_TYPES)) {
    const selected = state.selectedTower === key;
    const affordable = state.gold >= def.cost;

    ctx.fillStyle = selected ? '#1a3a5c' : (key === 'tesla' ? '#1a1a10' : '#0d2137');
    ctx.fillRect(px + 6, ty, PANEL_W - 12, CARD_H);
    ctx.strokeStyle = selected ? def.color : (key === 'tesla' ? '#4a4800' : (affordable ? '#2e3f50' : '#1a2530'));
    ctx.lineWidth = selected ? 2 : (key === 'tesla' ? 1.5 : 1);
    ctx.strokeRect(px + 6, ty, PANEL_W - 12, CARD_H);

    drawMiniTower(px + 28, ty + CARD_H/2, key, def);

    const tx2 = px + 54;
    ctx.fillStyle = affordable ? '#eceff1' : '#546e7a';
    ctx.font = `bold 12px monospace`;
    ctx.textAlign = 'left';
    ctx.fillText(def.name, tx2, ty + 14);

    ctx.fillStyle = key === 'tesla' ? '#fff176' : (affordable ? '#fff176' : '#546e7a');
    ctx.font = '11px monospace';
    ctx.fillText(`$${def.cost}`, tx2, ty + 26);

    ctx.fillStyle = '#78909c';
    ctx.font = '9px monospace';
    ctx.fillText(`DMG:${def.dmg}  RNG:${def.range}  ${(1/def.rate).toFixed(1)}s reload`, tx2, ty + 38);

    const descColor = { tesla:'#fff176', nuke:'#ce93d8', cryo:'#81d4fa', fire:'#ff7043', warship:'#4fc3f7', god:'#fff59d' }[key] || '#80cbc4';
    ctx.fillStyle = descColor;
    ctx.fillText(def.desc, tx2, ty + 51);

    ty += CARD_H + CARD_GAP;
  }

  ctx.fillStyle = '#607d8b';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Tap tower to upgrade · tap again to ascend', px + PANEL_W/2, ty + 11);

  drawAbilities();
}

// Layout for the spendable-ability buttons in the panel — single source for draw + input.
function abilityButtons() {
  const px = COLS * CELL;
  const n = Object.keys(TOWER_TYPES).length;
  const top = TOP_H + PANEL_HEADER + n * (CARD_H + CARD_GAP) + 32;
  const x = px + 6, w = PANEL_W - 12, h = 25, gap = 3;
  return {
    airstrike: { x, y: top,               w, h },
    freeze:    { x, y: top + (h + gap),   w, h },
    repair:    { x, y: top + 2*(h + gap), w, h },
  };
}

const ABILITY_META = {
  airstrike: { icon:'💥', name:'Airstrike', tip:'damage all', color:'#ff7043' },
  freeze:    { icon:'❄',  name:'Freeze All', tip:'4s slow',  color:'#80d8ff' },
  repair:    { icon:'❤',  name:'+5 Lives',  tip:'repair',    color:'#ef5350' },
};

function drawAbilities() {
  const px = COLS * CELL, B = abilityButtons();
  ctx.fillStyle = '#90caf9';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('ABILITIES', px + PANEL_W/2, B.airstrike.y - 8);

  for (const key of ['airstrike','freeze','repair']) {
    const r = B[key], m = ABILITY_META[key];
    const cost = abilityCost(key);
    const cd = state.abilityCd[key];
    const can = state.gold >= cost && cd <= 0;
    ctx.fillStyle = can ? '#152b33' : '#1a1f24';
    ctx.fillRect(r.x, r.y, r.w, r.h);
    ctx.strokeStyle = can ? m.color : '#37474f';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(r.x, r.y, r.w, r.h);
    // Cooldown wipe overlay
    if (cd > 0) {
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(r.x, r.y, r.w * (cd / ABILITY_CD[key]), r.h);
    }
    ctx.textAlign = 'left';
    ctx.fillStyle = can ? '#fff' : '#607d8b';
    ctx.font = 'bold 11px monospace';
    ctx.fillText(`${m.icon} ${m.name}`, r.x + 6, r.y + 16);
    ctx.textAlign = 'right';
    ctx.fillStyle = can ? '#fff176' : '#546e7a';
    ctx.font = '10px monospace';
    ctx.fillText(`$${cost.toLocaleString()}`, r.x + r.w - 6, r.y + 16);
  }
}

function drawMiniTower(cx, cy, type, def) {
  ctx.fillStyle = '#37474f';
  ctx.fillRect(cx - 14, cy - 12, 28, 24);
  ctx.fillStyle = def.color;
  ctx.fillRect(cx - 10, cy - 8, 20, 16);
  ctx.fillStyle = '#263238';
  if (type === 'tesla') {
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(cx-6,cy); ctx.lineTo(cx+6,cy);
    ctx.moveTo(cx,cy-6); ctx.lineTo(cx,cy+6);
    ctx.stroke();
    ctx.strokeStyle = def.color;
    ctx.beginPath();
    ctx.arc(cx, cy, 10, 0, Math.PI*2);
    ctx.stroke();
  } else if (type === 'cryo') {
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 6; i++) {
      const a = (i/6)*Math.PI*2;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(a)*10, cy + Math.sin(a)*10);
      ctx.stroke();
    }
  } else if (type === 'nuke') {
    ctx.fillRect(cx+2, cy-4, 14, 8);
    ctx.fillStyle = '#ff5722';
    ctx.beginPath();
    ctx.moveTo(cx+16,cy-4); ctx.lineTo(cx+20,cy); ctx.lineTo(cx+16,cy+4); ctx.closePath();
    ctx.fill();
  } else if (type === 'fire') {
    ctx.fillRect(cx+2, cy-3, 12, 6);
    ctx.fillStyle = '#ffcc02';
    ctx.beginPath();
    ctx.arc(cx, cy-8, 3, 0, Math.PI*2);
    ctx.fill();
  } else if (type === 'warship') {
    ctx.strokeStyle = '#e1f5fe';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(cx-6,cy); ctx.lineTo(cx+6,cy);
    ctx.moveTo(cx,cy-6); ctx.lineTo(cx,cy+6);
    ctx.stroke();
    ctx.strokeStyle = def.color;
    ctx.beginPath();
    ctx.arc(cx, cy, 10, 0, Math.PI*2);
    ctx.stroke();
  } else if (type === 'god') {
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(cx, cy, 10, 0, Math.PI*2);
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('✦', cx, cy + 4);
  } else if (type === 'blackhole') {
    ctx.fillStyle = '#1a0a2e';
    ctx.beginPath(); ctx.arc(cx, cy, 8, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#b388ff';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(cx, cy, 11, 0.4, 0.4 + Math.PI*1.4); ctx.stroke();
  } else {
    const blen = type === 'sniper' ? 16 : 11;
    ctx.fillRect(cx+2, cy-3, blen, 6);
  }
}

// Stat line shown above a hovered/selected tower.
function upgradeStatLine(key) {
  const u = UPGRADE_DEFS[key];
  if (u.mode === 'rate') return `DMG:${u.dmg}  RNG:${u.range}  ${(1/u.rate).toFixed(1)}s reload`;
  const tail = u.slowMult != null ? `SLOW:${Math.round(u.slowMult*100)}%`
             : (u.mode === 'aoe' ? 'AoE' : 'continuous');
  return `DPS:${u.dps.toLocaleString()}  RNG:${u.range}  ${tail}`;
}
function baseStatLine(def) { return `DMG:${def.dmg}  RNG:${def.range}  ${(1/def.rate).toFixed(1)}s reload`; }

function drawRangeCircle(tower) {
  const def = TOWER_TYPES[tower.type];
  const u = tower.upgrade ? UPGRADE_DEFS[tower.upgrade] : null;
  const color = u ? u.color : def.color;
  const range = (u ? u.range : def.range) * CELL;

  ctx.globalAlpha = 0.1;
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(tower.x, tower.y, range, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 0.45;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(tower.x, tower.y, range, 0, Math.PI*2); ctx.stroke();
  ctx.globalAlpha = 1;

  ctx.textAlign = 'center';
  const tx = tower.x, ty = tower.y;
  const ascTag = tower.ascend ? `  ✦${tower.ascend}` : '';
  if (u) {
    ctx.font = 'bold 12px monospace'; ctx.fillStyle = u.color;
    ctx.fillText(`${u.icon} ${u.name}${ascTag}`, tx, ty - 32);
    ctx.font = '10px monospace'; ctx.fillStyle = '#e0e0e0';
    ctx.fillText(upgradeStatLine(tower.upgrade), tx, ty - 19);
  } else {
    ctx.font = 'bold 11px monospace'; ctx.fillStyle = def.color;
    ctx.fillText(`${def.name}${ascTag}`, tx, ty - 32);
    ctx.font = '10px monospace'; ctx.fillStyle = '#cfd8dc';
    ctx.fillText(baseStatLine(def), tx, ty - 19);
  }
  if (tower === state.selectedPlacedTower) {
    // Tell the player exactly what tapping the tower again will buy.
    const p = nextPurchase(tower);
    const can = state.gold >= p.cost;
    ctx.font = 'bold 10px monospace'; ctx.fillStyle = can ? '#a5d6a7' : '#ef9a9a';
    ctx.fillText(`▲ TAP TOWER → ${p.label}  $${p.cost.toLocaleString()}`, tx, ty - 46);
  } else {
    ctx.font = '9px monospace'; ctx.fillStyle = '#90a4ae';
    ctx.fillText('tap for upgrade / sell', tx, ty - 45);
  }
}

// Action-button layout for the selected tower — shared by draw and input so the
// hit regions can never drift from what's rendered.
// Upgrading/ascending is done by tapping the tower itself; the only button here is Sell.
function towerActions(t) {
  const refund = Math.floor((t.invested || 0) * 0.7);
  const w = 150, h = 22;
  const bx = Math.max(2, Math.min(t.x - w/2, COLS*CELL - w - 2));
  let by = t.y + 24;
  if (by + h > TOP_H + ROWS*CELL) by = t.y - 24 - h;
  return { refund, rects: { sell: { x:bx, y:by, w, h } } };
}

function drawTowerActions(t) {
  const { refund, rects } = towerActions(t);
  drawButton(rects.sell.x, rects.sell.y, rects.sell.w, rects.sell.h,
    `✕ Sell +$${refund.toLocaleString()}`, '#3a2410', '#a1672a');
}


function drawPlacementPreview() {
  const { c, r } = state.hoverCell;
  const isWater = LAKE_SET.has(`${c},${r}`);
  if (PATH_SET.has(`${c},${r}`) || hasTower(c, r)) return;
  if (state.selectedTower === 'warship' && !isWater) return;
  if (state.selectedTower !== 'warship' && isWater) return;
  const def = TOWER_TYPES[state.selectedTower];
  const affordable = state.gold >= def.cost;
  ctx.globalAlpha = 0.35;
  ctx.fillStyle = affordable ? def.color : '#f44336';
  ctx.fillRect(c*CELL, r*CELL+TOP_H, CELL, CELL);
  ctx.globalAlpha = 1;
  if (affordable) {
    const cx = c*CELL+CELL/2, cy = r*CELL+TOP_H+CELL/2;
    ctx.globalAlpha = 0.1;
    ctx.fillStyle = def.color;
    ctx.beginPath();
    ctx.arc(cx, cy, def.range * CELL, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.35;
    ctx.strokeStyle = def.color;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(cx, cy, def.range * CELL, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, CW, CH);
  const mx = CW/2, my = CH/2;
  ctx.fillStyle = '#1a237e';
  ctx.fillRect(mx-170, my-105, 340, 210);
  ctx.strokeStyle = '#ef5350';
  ctx.lineWidth = 3;
  ctx.strokeRect(mx-170, my-105, 340, 210);
  ctx.fillStyle = '#ef5350';
  ctx.font = 'bold 32px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', mx, my - 48);
  ctx.fillStyle = '#90caf9';
  ctx.font = '18px monospace';
  ctx.fillText(`Survived ${state.wave} wave${state.wave !== 1 ? 's' : ''}`, mx, my - 14);
  ctx.fillStyle = state.wave >= bestWave ? '#ffd54f' : '#78909c';
  ctx.font = '13px monospace';
  ctx.fillText(state.wave >= bestWave ? `★ New best!` : `Best: ${bestWave} waves`, mx, my + 8);
  drawButton(mx-75, my+30, 150, 44, 'RESTART', '#1b5e20', '#4caf50');
}

// ─── Input ────────────────────────────────────────────────────────────────────

function hasTower(c, r) { return state.towers.some(t => t.c === c && t.r === r); }

// Map a client (CSS-pixel) point to canvas-buffer coordinates. The canvas is scaled
// down by fitCanvas(), so rect.width !== CW on small screens — rescale to compensate.
function toCanvasCoords(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return {
    mx: (clientX - rect.left) * (CW / rect.width),
    my: (clientY - rect.top) * (CH / rect.height),
  };
}

function handleHover(mx, my) {
  state.hoverCell = (my >= TOP_H && mx < COLS*CELL)
    ? { c: Math.floor(mx/CELL), r: Math.floor((my-TOP_H)/CELL) } : null;
  state.hoveredTower = null;
  for (const t of state.towers) {
    if (Math.abs(mx-t.x) < CELL/2 && Math.abs(my-t.y) < CELL/2) { state.hoveredTower = t; break; }
  }
}

canvas.addEventListener('mousemove', ev => {
  const { mx, my } = toCanvasCoords(ev.clientX, ev.clientY);
  handleHover(mx, my);
});

canvas.addEventListener('mouseleave', () => { state.hoverCell = null; state.hoveredTower = null; });

// Touch: a finger has no hover, so while it's down we show the range/placement
// preview under it; lifting performs the tap (place/upgrade/button). preventDefault
// stops the synthetic mouse "click" from firing the tap a second time.
canvas.addEventListener('touchstart', ev => {
  ev.preventDefault();
  const t = ev.touches[0];
  const { mx, my } = toCanvasCoords(t.clientX, t.clientY);
  handleHover(mx, my);
}, { passive: false });

canvas.addEventListener('touchmove', ev => {
  ev.preventDefault();
  const t = ev.touches[0];
  const { mx, my } = toCanvasCoords(t.clientX, t.clientY);
  handleHover(mx, my);
}, { passive: false });

canvas.addEventListener('touchend', ev => {
  ev.preventDefault();
  const t = ev.changedTouches[0];
  const { mx, my } = toCanvasCoords(t.clientX, t.clientY);
  handleTap(mx, my);
  state.hoverCell = null;
  state.hoveredTower = null;
}, { passive: false });

canvas.addEventListener('click', ev => {
  const { mx, my } = toCanvasCoords(ev.clientX, ev.clientY);
  handleTap(mx, my);
});

function handleTap(mx, my) {
  if (state.gameOver) {
    if (mx >= CW/2-75 && mx <= CW/2+75 && my >= CH/2+30 && my <= CH/2+74) state = createState();
    return;
  }
  // Map dropdown options have priority while open
  if (state.mapDropdownOpen) {
    const x = 620, y = 42, w = 130, optH = 28;
    if (mx >= x && mx <= x + w && my >= y && my <= y + MAP_NAMES.length * optH) {
      const idx = Math.floor((my - y) / optH);
      if (idx >= 0 && idx < MAP_NAMES.length) {
        if (state.wave === 0 && idx !== activeMap) { setMap(idx); state = createState(); return; }
        state.mapDropdownOpen = false; return;
      }
    }
    state.mapDropdownOpen = false;
    // fall through so other clicks still register
  }
  const B = topBarButtons();
  if (inRect(mx, my, B.speed)) { state.speed = state.speed===1?2:state.speed===2?4:1; return; }
  if (inRect(mx, my, B.pause)) { state.paused = !state.paused; return; }
  if (inRect(mx, my, B.auto))  { state.autoStart = !state.autoStart; if (state.autoStart && !state.waveActive) startWave(); return; }
  if (inRect(mx, my, B.map))   { if (state.wave === 0) state.mapDropdownOpen = !state.mapDropdownOpen; return; }
  if (inRect(mx, my, B.start)) { startWave(); return; }

  // Spendable abilities (panel buttons).
  const A = abilityButtons();
  for (const key of ['airstrike','freeze','repair']) {
    if (inRect(mx, my, A[key])) { useAbility(key); return; }
  }

  // Sell button for the currently-selected tower takes priority over the grid beneath it.
  if (state.selectedPlacedTower && state.towers.includes(state.selectedPlacedTower)) {
    const t = state.selectedPlacedTower;
    const { refund, rects } = towerActions(t);
    if (inRect(mx, my, rects.sell)) {
      state.gold += refund;
      state.towers = state.towers.filter(x => x !== t);
      state.selectedPlacedTower = null;
      return;
    }
  }

  const px = COLS * CELL;
  if (mx >= px && mx < px+PANEL_W && my >= TOP_H) {
    let ty = TOP_H + PANEL_HEADER;
    for (const key of Object.keys(TOWER_TYPES)) {
      if (my >= ty && my < ty+CARD_H) { state.selectedTower = key; state.selectedPlacedTower = null; return; }
      ty += CARD_H + CARD_GAP;
    }
    return;
  }

  if (my >= TOP_H && mx < COLS*CELL) {
    const c = Math.floor(mx/CELL), r = Math.floor((my-TOP_H)/CELL);
    // Tap an existing tower → select it. Tap it again (when already selected) →
    // buy its next upgrade tier, or an ascension level once fully upgraded.
    const existing = state.towers.find(t => t.c === c && t.r === r);
    if (existing) {
      if (existing === state.selectedPlacedTower) buyTowerUpgrade(existing);
      else state.selectedPlacedTower = existing;
      return;
    }
    // Empty cell → deselect, then try to place.
    state.selectedPlacedTower = null;
    if (PATH_SET.has(`${c},${r}`)) return;
    const isWater = LAKE_SET.has(`${c},${r}`);
    // Warship must be placed on water; all other towers cannot be on water
    if (state.selectedTower === 'warship' && !isWater) return;
    if (state.selectedTower !== 'warship' && isWater) return;
    const def = TOWER_TYPES[state.selectedTower];
    if (state.gold < def.cost) return;
    state.gold -= def.cost;
    state.towers.push({ c, r, x:c*CELL+CELL/2, y:r*CELL+TOP_H+CELL/2, type:state.selectedTower, cooldown:0, aimAngle:0, invested:def.cost, ascend:0 });
    return;
  }

  // Tapped empty space (e.g. top bar gap) → clear any selection.
  state.selectedPlacedTower = null;
}

// ─── Game Loop ────────────────────────────────────────────────────────────────

function loop(ts) {
  const rawDt = Math.min((ts - (state.lastTime || ts)) / 1000, 0.05);
  state.lastTime = ts;
  const dt = state.paused ? 0 : rawDt * state.speed;
  for (const p of state.particles) {
    if (p.type === 'spark' && (p.vx || p.vy)) {
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vx *= 0.88; p.vy *= 0.88;
    }
  }
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
